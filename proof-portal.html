<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VRI™ Proof Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #020818, #040d2a, #020c1e);
  color: white;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  padding: 40px;
}

.container {
  max-width: 720px;
  margin: auto;
  background: rgba(2, 8, 24, 0.85);
  border: 1px solid rgba(30, 143, 255, 0.55);
  border-radius: 16px;
  padding: 28px;
  box-shadow: 0 0 24px rgba(0, 140, 255, 0.25);
}

h1 {
  margin-top: 0;
  letter-spacing: 2px;
}

.subtitle {
  color: #8fbfff;
  margin-bottom: 25px;
}

label {
  display: block;
  margin-top: 14px;
  color: #8fbfff;
  font-size: 13px;
}

input,
textarea,
select {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  background: #06142d;
  border: 1px solid #1e8fff;
  color: white;
  border-radius: 8px;
  outline: none;
}

textarea {
  min-height: 140px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 24px;
  padding: 16px;
  border: 1px solid #1e8fff;
  background: rgba(0, 80, 255, 0.25);
  color: white;
  border-radius: 8px;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 0 18px rgba(0, 140, 255, 0.45);
}

button:hover {
  background: rgba(0, 120, 255, 0.35);
}

.result {
  margin-top: 24px;
  padding: 16px;
  border: 1px solid rgba(0, 255, 153, 0.55);
  background: rgba(0, 40, 20, 0.55);
  color: #00ff99;
  border-radius: 10px;
  font-family: "Courier New", monospace;
  line-height: 1.6;
  display: none;
}

.error {
  border-color: rgba(255, 60, 60, 0.7);
  background: rgba(80, 0, 0, 0.45);
  color: #ff6b6b;
}
</style>
</head>

<body>

<div style="position:absolute; top:15px; right:20px; z-index:999; font-size:12px;">
  <a href="/index.html" style="color:#8fbfff; margin-right:15px;">System</a>
  <a href="/proof-portal.html" style="color:#8fbfff; margin-right:15px;">Create Proof</a>
  <a href="/receipt.html" style="color:#8fbfff; margin-right:15px;">Receipt</a>
  <a href="/verification-monitor.html" style="color:#8fbfff;">Monitor</a>
</div>

<div class="container">
  <h1>VRI™ Proof Portal</h1>
  <div class="subtitle">
    Create a document proof record, attach sender and recipient details, and generate a receipt.
  </div>

  <label>Sender Name</label>
  <input id="senderName" placeholder="Enter sender name">

  <label>Sender Email</label>
  <input id="senderEmail" placeholder="Enter sender email">

  <label>Sender Phone</label>
  <input id="senderPhone" placeholder="Enter sender phone">

  <label>Business Name</label>
  <input type="text" id="businessName" placeholder="Enter business or organization name" />

  <label>Recipient Name</label>
  <input id="recipientName" placeholder="Enter recipient name">

  <label>Recipient Email</label>
  <input id="recipientEmail" placeholder="Enter recipient email">

  <label>Verification Intent</label>
  <select id="verificationIntent">
    <option value="General">General</option>
    <option value="Legal Proof">Legal Proof</option>
    <option value="Business Transaction">Business Transaction</option>
    <option value="Internal Audit">Internal Audit</option>
    <option value="Identity Confirmation">Identity Confirmation</option>
  </select>

  <label>Document Title</label>
  <input id="documentTitle" placeholder="Enter document title">

  <label>Document Content</label>
  <textarea id="documentContent" placeholder="Enter or paste document content"></textarea>

  <button onclick="createProof()">CREATE PROOF RECORD</button>

<button onclick="testExternalPlugin()">TEST COMPANY PLUG-IN</button>

<div id="result" class="result"></div>
</div>


<script>
const SUPABASE_URL = "https://atoklygiqhyfuorhtmfl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0b2tseWdpcWh5ZnVvcmh0bWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjY0MTIsImV4cCI6MjA5MjkwMjQxMn0.XEJ2_ggEmATIOv80-ernjFizRqw6tTcUJS_JW9Xbqp0";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let lastProofId = "";

function cleanValue(value, fallback = "") {
  if (value === null || value === undefined) return fallback;
  const cleaned = String(value).trim();
  return cleaned || fallback;
}

async function createProof() {
  const resultBox = document.getElementById("result");

  resultBox.className = "result";
  resultBox.style.display = "block";
  resultBox.innerHTML = "Creating proof record...";

  try {
    const proofId = "VRI-" + Date.now();
    const companyId = "VRI_INTERNAL";
    lastProofId = proofId;

    const senderName = cleanValue(document.getElementById("senderName").value);
    const senderEmail = cleanValue(document.getElementById("senderEmail").value);
    const senderPhone = cleanValue(document.getElementById("senderPhone").value);
    const businessName = cleanValue(document.getElementById("businessName").value, "Individual");
    const recipientName = cleanValue(document.getElementById("recipientName").value);
    const recipientEmail = cleanValue(document.getElementById("recipientEmail").value);
    const verificationIntent = cleanValue(document.getElementById("verificationIntent").value, "General");
    const documentTitle = cleanValue(document.getElementById("documentTitle").value, "Untitled Document");
    const documentContent = cleanValue(document.getElementById("documentContent").value);

    if (!senderName || !senderEmail || !recipientName || !recipientEmail || !documentContent) {
      throw new Error("Please fill in sender name, sender email, recipient name, recipient email, and document content.");
    }

    const { error: documentError } = await supabaseClient
      .from("documents")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        document_title: documentTitle,
        document_type: "proof_document",
        document_content: documentContent,
        sender_name: senderName,
        sender_email: senderEmail,
        sender_phone: senderPhone,
        sender_business: businessName,
        recipient_name: recipientName,
        recipient_email: recipientEmail,
        verification_intent: verificationIntent,
        business_name: businessName,
        status: "CREATED"
      }]);

    if (documentError) throw documentError;

    const { error: proofError } = await supabaseClient
      .from("proof_records")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        event_type: "created",
        source: "internal_portal",
        industry: "general",
        status: "VERIFIED",
        verification_note: "Proof portal record created",
        verification_intent: verificationIntent,
        business_name: businessName
      }]);

    if (proofError) throw proofError;

    const { error: eventError } = await supabaseClient
      .from("verification_events")
      .insert([
        {
          proof_id: proofId,
          event_type: "DOCUMENT_CREATED",
          event_note: "Intent: " + verificationIntent + " | Business: " + businessName
        },
        {
          proof_id: proofId,
          event_type: "DOCUMENT_APPROVED",
          event_note: "Document approved for receipt generation"
        },
        {
          proof_id: proofId,
          event_type: "DOCUMENT_SENT",
          event_note: "Recipient attached to proof workflow"
        },
        {
          proof_id: proofId,
          event_type: "RECEIPT_GENERATED",
          event_note: "Proof receipt generated"
        }
      ]);

    if (eventError) throw eventError;

    const { error: recipientError } = await supabaseClient
      .from("recipients")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        recipient_name: recipientName,
        recipient_email: recipientEmail,
        recipient_phone: "",
        delivery_status: "PENDING"
      }]);

    if (recipientError) throw recipientError;

    const { error: receiptError } = await supabaseClient
      .from("receipts")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        receipt_status: "GENERATED",
        receipt_note: "Receipt generated through VRI Proof Portal"
      }]);

    if (receiptError) throw receiptError;

    resultBox.className = "result";
    resultBox.innerHTML =
      "<strong>✔ PROOF RECORD CREATED</strong><br><br>" +
      "Proof ID: " + proofId + "<br>" +
      "Company ID: " + companyId + "<br>" +
      "Status: VERIFIED<br>" +
      "Verification Intent: " + verificationIntent + "<br>" +
      "Sender: " + senderName + "<br>" +
      "Recipient: " + recipientName + "<br>" +
      "Business: " + businessName + "<br>" +
      "Timestamp: " + new Date().toLocaleString() + "<br><br>" +
      "<button onclick='goToReceipt()'>VIEW RECEIPT</button>";

  } catch (error) {
    console.error("VRI Proof Portal Error:", error);
    resultBox.className = "result error";
    resultBox.innerHTML = "Error: " + error.message;
  }
}

async function createProofExternal(payload) {
  try {
    const proofId = payload.proof_id || "VRI-EXT-" + Date.now();
    const companyId = payload.company_id || "EXT_" + Date.now();

    const senderName = cleanValue(payload.sender_name, "External Sender");
    const senderEmail = cleanValue(payload.sender_email, "");
    const senderPhone = cleanValue(payload.sender_phone, "");
    const businessName = cleanValue(payload.business_name, "External Company");
    const recipientName = cleanValue(payload.recipient_name, "External Recipient");
    const recipientEmail = cleanValue(payload.recipient_email, "");
    const verificationIntent = cleanValue(payload.verification_intent, "Company Plug-In Verification");
    const documentTitle = cleanValue(payload.document_title, "External Proof Document");
    const documentContent = cleanValue(payload.document_content, "Proof created through external company plug-in.");

    if (!senderEmail || !recipientEmail) {
      throw new Error("External proof requires sender_email and recipient_email.");
    }

    const { error: documentError } = await supabaseClient
      .from("documents")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        document_title: documentTitle,
        document_type: "external_proof_document",
        document_content: documentContent,
        sender_name: senderName,
        sender_email: senderEmail,
        sender_phone: senderPhone,
        sender_business: businessName,
        recipient_name: recipientName,
        recipient_email: recipientEmail,
        verification_intent: verificationIntent,
        business_name: businessName,
        status: "CREATED"
      }]);

    if (documentError) throw documentError;

    const { error: proofError } = await supabaseClient
      .from("proof_records")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        event_type: "created",
        source: "external_plugin",
        industry: cleanValue(payload.industry, "general"),
        status: "VERIFIED",
        verification_note: "Proof record created through VRI company plug-in function",
        verification_intent: verificationIntent,
        business_name: businessName
      }]);

    if (proofError) throw proofError;

    const { error: eventError } = await supabaseClient
      .from("verification_events")
      .insert([
        {
          proof_id: proofId,
          event_type: "EXTERNAL_PROOF_CREATED",
          event_note: "External company plug-in created proof"
        },
        {
          proof_id: proofId,
          event_type: "COMPANY_PLUGIN_VERIFIED",
          event_note: "Business: " + businessName + " | Intent: " + verificationIntent
        },
        {
          proof_id: proofId,
          event_type: "RECEIPT_GENERATED",
          event_note: "Receipt generated for external proof"
        }
      ]);

    if (eventError) throw eventError;

    const { error: recipientError } = await supabaseClient
      .from("recipients")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        recipient_name: recipientName,
        recipient_email: recipientEmail,
        recipient_phone: cleanValue(payload.recipient_phone, ""),
        delivery_status: "PENDING"
      }]);

    if (recipientError) throw recipientError;

    const { error: receiptError } = await supabaseClient
      .from("receipts")
      .insert([{
        proof_id: proofId,
        company_id: companyId,
        receipt_status: "GENERATED",
        receipt_note: "Receipt generated through VRI company plug-in function"
      }]);

    if (receiptError) throw receiptError;

    return {
      success: true,
      proof_id: proofId,
      company_id: companyId,
      status: "VERIFIED",
      business_name: businessName,
      verification_intent: verificationIntent,
      message: "External company proof created successfully."
    };

  } catch (error) {
    console.error("VRI External Plug-In Error:", error);
    return {
      success: false,
      error: error.message
    };
  }
}

async function testExternalPlugin() {
  const resultBox = document.getElementById("result");

  resultBox.className = "result";
  resultBox.style.display = "block";
  resultBox.innerHTML = "Testing company plug-in proof creation...";

  const result = await createProofExternal({
    company_id: "CONNECTED_COMPANY_DEMO",
    sender_name: "External System",
    sender_email: "system@connectedcompany.com",
    sender_phone: "000-000-0000",
    business_name: "Connected Company",
    recipient_name: "Test Recipient",
    recipient_email: "testrecipient@email.com",
    recipient_phone: "",
    document_title: "External Company Verification Test",
    document_content: "This proof was created through the VRI company plug-in function.",
    verification_intent: "Company Plug-In Verification",
    industry: "enterprise"
  });

  if (result.success) {
    lastProofId = result.proof_id;

    resultBox.className = "result";
    resultBox.innerHTML =
      "<strong>✔ COMPANY PLUG-IN TEST SUCCESSFUL</strong><br><br>" +
      "Proof ID: " + result.proof_id + "<br>" +
      "Company ID: " + result.company_id + "<br>" +
      "Status: " + result.status + "<br>" +
      "Business: " + result.business_name + "<br>" +
      "Verification Intent: " + result.verification_intent + "<br><br>" +
      "<button onclick='goToReceipt()'>VIEW RECEIPT</button>";
  } else {
    resultBox.className = "result error";
    resultBox.innerHTML = "Company plug-in test failed: " + result.error;
  }
}

function goToReceipt() {
  if (!lastProofId) {
    alert("No proof created yet.");
    return;
  }

  window.location.href = "/receipt.html?proof=" + encodeURIComponent(lastProofId);
}
</script>


</body>
</html>
