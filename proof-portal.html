function cleanValue(value, fallback = "") {
  if (value === null || value === undefined) return fallback;
  const cleaned = String(value).trim();
  return cleaned || fallback;
}

function verifyEmailLight(email) {
  const cleanedEmail = cleanValue(email).toLowerCase();
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!cleanedEmail) {
    return { status: "MISSING", verified_at: "" };
  }

  if (!emailPattern.test(cleanedEmail)) {
    return { status: "INVALID_FORMAT", verified_at: new Date().toISOString() };
  }

  return { status: "FORMAT_VERIFIED", verified_at: new Date().toISOString() };
}

function verifyPhoneLight(phone) {
  const cleanedPhone = cleanValue(phone);
  const digitsOnly = cleanedPhone.replace(/\D/g, "");

  if (!cleanedPhone) {
    return { status: "MISSING", verified_at: "" };
  }

  if (digitsOnly.length < 10) {
    return { status: "INVALID_FORMAT", verified_at: new Date().toISOString() };
  }

  return { status: "FORMAT_VERIFIED", verified_at: new Date().toISOString() };
}

  function getBadge(status) {
  if (status === "FORMAT_VERIFIED") {
    return "<span class='badge badge-green'>✔ VERIFIED</span>";
  }
  if (status === "INVALID_FORMAT") {
    return "<span class='badge badge-yellow'>⚠ INVALID</span>";
  }
  return "<span class='badge badge-red'>✖ MISSING</span>";
}

  function getHaloStatus(emailStatus, phoneStatus) {
  if (emailStatus === "FORMAT_VERIFIED" && phoneStatus === "FORMAT_VERIFIED") {
    return "<span class='badge badge-green'>🟢 GOVERNED</span>";
  }

  if (emailStatus === "MISSING" || phoneStatus === "MISSING") {
    return "<span class='badge badge-red'>🔴 RISK</span>";
  }

  return "<span class='badge badge-yellow'>🟡 REVIEW</span>";
}

    resultBox.className = "result";

async function createProofExternal(payload) {
  try {

    lastProofId = proofId;

    const senderName = cleanValue(payload.sender_name, "External System");
    const senderEmail = cleanValue(payload.sender_email, "system@connectedcompany.com");

    const businessName = cleanValue(payload.business_name, "Connected Company");
    const recipientName = cleanValue(payload.recipient_name, "Test Recipient");
    const recipientEmail = cleanValue(payload.recipient_email, "testrecipient@email.com");
    const recipientPhone = cleanValue(payload.recipient_phone, "");
    const documentTitle = cleanValue(payload.document_title, "External Company Verification Proof");

    const verificationIntent = cleanValue(payload.verification_intent, "External Verification");

    const recipientEmailVerification = verifyEmailLight(recipientEmail);
    const senderPhoneVerification = verifyPhoneLight(senderPhone);

    if (!senderEmail || !recipientEmail) {

    const { error: documentError } = await supabaseClient

    if (proofError) throw proofError;

    const { error: eventError } = await supabaseClient

        {
          proof_id: proofId,

        },
        {
          proof_id: proofId,
          event_type: "EMAIL_LIGHT_VERIFIED",
          event_note: "Recipient email verification status: " + recipientEmailVerification.status
        },
        {
          proof_id: proofId,
          event_type: "PHONE_LIGHT_VERIFIED",
          event_note: "Sender phone verification status: " + senderPhoneVerification.status
        },
        {
          proof_id: proofId,
          event_type: "COMPANY_PLUGIN_VERIFIED",
          event_note: "Business: " + businessName + " | Intent: " + verificationIntent
        },
        {
          proof_id: proofId,
          event_type: "RECEIPT_GENERATED",
          event_note: "Receipt generated for external verification proof"
        }
      ]);

    if (eventError) throw eventError;

    const { error: recipientError } = await supabaseClient
      .from("recipients")
      .insert([{
        proof_id: proofId,
        company_id: companyId,

        recipient_name: recipientName,
        recipient_email: recipientEmail,
        recipient_phone: recipientPhone,

        email_verification_status: recipientEmailVerification.status,
        email_verified_at: recipientEmailVerification.verified_at,

        phone_verification_status: senderPhoneVerification.status,

    if (recipientError) throw recipientError;
