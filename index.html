.node {

.glow-pulse {

  50% { opacity: 0.9; transform: scale(1.04); }

@keyframes rotateCore {

<script>
let totalVerifications = 0;

async function createProofRecord(industryName) {
  const proofId = "VRI-2026-" + Math.floor(10000 + Math.random() * 90000);

  const { data, error } = await supabaseClient
    .from("proof_records")
    .insert([
      {
        proof_id: proofId,
        event_type: "verification",
        industry: industryName,
        status: "VERIFIED",
        verification_note: "Live VRI verification"
      }
    ])
    .select()
    .single();

  if (error) {
    console.error("Supabase error:", error);
    alert("Error creating proof record: " + error.message);
    return null;
  }

  return data;
}

function showCreatedProof(record) {
  document.getElementById("proofId").textContent = record.proof_id;
  document.getElementById("proofStatus").textContent = record.status;
  document.getElementById("proofIndustry").textContent = record.industry || "N/A";
  document.getElementById("proofTimestamp").textContent =
    record.created_at ? new Date(record.created_at).toLocaleString() : "N/A";

  document.getElementById("proofBox").style.display = "block";
  document.getElementById("lookupProofId").value = record.proof_id;

  totalVerifications++;
  document.getElementById("liveCount").textContent = totalVerifications;
}

async function runVerification() {
  document.getElementById("lookupResult").innerHTML =
    "🔄 Processing verification...";

  const record = await createProofRecord("general");

  if (!record) return;

  showCreatedProof(record);

  document.getElementById("lookupResult").innerHTML =
    "✔ Proof created. Full record displayed on left.";
}

async function verifyProofRecord() {
  const proofId = document.getElementById("lookupProofId").value.trim();

  if (!proofId) {
    document.getElementById("lookupResult").innerHTML = "Enter a Proof ID first.";
    return;
  }

  document.getElementById("lookupResult").innerHTML = "🔎 Searching proof record...";

  const { data, error } = await supabaseClient
    .from("proof_records")
    .select("*")
    .eq("proof_id", proofId)
    .maybeSingle();

  if (error) {
    console.error("Lookup error:", error);
    document.getElementById("lookupResult").innerHTML = "Lookup error. Check console.";
    return;
  }

  if (!data) {
    document.getElementById("lookupResult").innerHTML = "❌ No verified record found.";
    return;
  }

  document.getElementById("lookupResult").innerHTML =
    "<strong>✔ VERIFIED RECORD</strong><br>" +
    "Proof ID: " + data.proof_id + "<br>" +
    "Status: " + data.status + "<br>" +
    "Industry: " + (data.industry || "N/A") + "<br>" +
    "Timestamp: " + (data.created_at ? new Date(data.created_at).toLocaleString() : "N/A");
}

async function nodeClick(name) {
  document.getElementById("lookupResult").innerHTML =
    "🔄 Processing " + name + " verification...";

  const record = await createProofRecord(name);

  if (!record) return;

  showCreatedProof(record);

  document.getElementById("lookupResult").innerHTML =
    "✔ " + name + " proof created. Full record displayed on left.";
}
</script>
