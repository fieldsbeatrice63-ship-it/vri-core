<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;

    overflow: hidden;
  }

  .screen {
    width: 100vw;

    position: relative;

  }

  .left-panel {
    position: absolute;
    top: 90px;
    left: 55px;
    z-index: 10;
    width: 300px;
  }

  .brand {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 1px;
  }

  .brand span {
    color: #00c8ff;
  }

  .title {
    margin-top: 70px;
    font-size: 28px;
    letter-spacing: 5px;
    line-height: 1.5;
  }

  .blue {
    color: #1e8fff;
  }

  .subtitle {
    margin-top: 35px;
    color: #c9d8ff;
    font-size: 20px;
    line-height: 1.5;
  }

  .run-btn {
    margin-top: 35px;
    padding: 17px 30px;
    border: 1px solid #1e8fff;
    background: rgba(0, 80, 255, 0.18);
    color: white;
    letter-spacing: 3px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 18px rgba(0, 140, 255, 0.45);
  }

  .run-btn:hover {
    background: rgba(0, 120, 255, 0.35);
  }

  .proof-box {
    margin-top: 25px;
    font-family: "Courier New", monospace;
    color: #00ff99;
    display: none;
  }

  svg {
    width: 100vw;
    height: 100vh;
  }

  .node {
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .node:hover circle {
    stroke: #00ff99;
  }

  .packet {
    filter: url(#glow);
  }

  .pulse-ring {
    animation: pulse 3s infinite ease-in-out;
    transform-origin: center;
  }

  .rotate-ring {
    animation: rotateCore 22s linear infinite;
    transform-origin: 600px 424px;
  }

  .glow-pulse {
    animation: glowPulse 2.5s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.04); }
  }

  @keyframes rotateCore {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .corner {
    position: absolute;
    right: 55px;
    top: 45px;
    color: #2d7fd9;
    font-size: 34px;
    opacity: 0.8;
  }
</style>

<script>
async function runVerification() {
  const proofId = "VRI-2026-" + Math.floor(10000 + Math.random() * 90000);

  const { data, error } = await supabaseClient
    .from("proof_records")
    .insert([
      {
        proof_id: proofId,
        event_type: "verification",
        industry: "general",
        status: "VERIFIED",
        verification_note: "Live VRI verification"
      }
    ]);

  if (error) {
    console.error(error);
    alert("Error creating proof record");
    return;
  }

  document.getElementById("proofId").textContent = proofId;
  document.getElementById("proofBox").style.display = "block";
}
 async function verifyProofRecord() {
  const proofId = document.getElementById("lookupProofId").value.trim();

  if (!proofId) {
    document.getElementById("lookupResult").innerHTML = "Enter a Proof ID first.";
    return;
  }

  const { data, error } = await supabaseClient
    .from("proof_records")
    .select("*")
    .eq("proof_id", proofId)
    .single();

  if (error || !data) {
    document.getElementById("lookupResult").innerHTML =
      "❌ NO VERIFIED RECORD FOUND";
    return;
  }

  document.getElementById("lookupResult").innerHTML =
    "✅ VERIFIED RECORD FOUND<br><br>" +
    "Proof ID: " + data.proof_id + "<br>" +
    "Status: " + data.status + "<br>" +
    "Event: " + data.event_type + "<br>" +
    "Industry: " + data.industry + "<br>" +
    "Timestamp: " + new Date(data.created_at).toLocaleString();
}

function nodeClick(name) {
  const proof = "VRI-" + name.toUpperCase().slice(0,3) + "-" + Math.floor(10000 + Math.random() * 90000);
  document.getElementById("proofId").textContent = proof;
  document.getElementById("proofBox").style.display = "block";
}
</script>
